# 自动科研实验队列。围绕 T-ITS checklist 的 P0/P1 组织。
# 所有 residual baseline 共享同一 frozen mean，避免优势来自 backbone。

defaults:
  device: auto
  num_eval_samples: 100
  sampler: ddpm
  method: Prompt-STDiff
  implementation: ours

gpus: []   # 留空自动探测；或填 [0,1,2,3,4,5,6,7]

# 多 seed（checklist 要求 multi-seed paired bootstrap）
seeds: [2021, 2022, 2023]

# frozen mean checkpoint（服务器已确认存在）
frozen_backbone_ckpt: outputs/checkpoints/pdformer_mean/pems08/time_pdformer_e96_d4_s43_gpu2/best.pt

# incident/drop 事件文件（服务器已确认存在）
events:
  drop_csv: outputs/pems08_extreme_drop_events.csv
  mixed_csv: outputs/pems08_extreme_events.csv   # 含 kind 列(drop/spike)
  rootcause_out_dir: outputs/revision_8gpu_logs/incident

jobs:
  - name: pems08_pdformer_resdiff
    config: configs/pems08_pdformer_resdiff.yaml
    setting: full
    tags: [pems08, pdformer, resdiff, main]

  - name: pems08_pdformer_resdiff_nosem
    config: configs/pems08_pdformer_resdiff_nosem.yaml
    setting: ablation_nosem
    tags: [pems08, pdformer, resdiff, ablation]
